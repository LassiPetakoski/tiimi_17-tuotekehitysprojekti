<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Varaa siivous | Lapland Clean Co</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">
            <a href="index.html"><strong>Lapland Clean Co</strong></a>
        </div>
        <nav aria-label="Päävalikko">
            <ul>
                <li><a href="index.html">Etusivu</a></li>
                <li><a href="palvelut.html">Palvelut</a></li>
                <li><a href="ukk.html">UKK</a></li>
                <li><a href="yhteystiedot.html">Yhteystiedot</a></li>
                <li><a href="tilaus.html" class="active">Varaa siivous</a></li>
            </ul>
        </nav>
    </header>
<main id="main-content" class="container">
    <section class="order-section">
        <h1>Varaa siivous tai pyydä tarjous</h1>
        <p>Täytä alla olevat tiedot, olemme sinuun yhteydessä mahdollisimman pian!</p>

        <form action="#" method="post" class="cleaning-form">
            <fieldset>
                <legend>Yhteystiedot</legend>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="fullname">Koko nimi *</label>
                        <input type="text" id="fullname" name="fullname" required placeholder="Matti Meikäläinen">
                    </div>
                    <div class="form-group">
                        <label for="email">Sähköposti *</label>
                        <input type="email" id="email" name="email" required placeholder="matti@esimerkki.fi">
                    </div>
                    <div class="form-group">
                        <label for="phone">Puhelinnumero</label>
                        <input type="tel" id="phone" name="phone" placeholder="040 123 4567">
                    </div>
                </div>
            </fieldset>

            <fieldset>
                <legend>Palvelun tiedot</legend>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="service-type">Valitse palvelu</label>
                        <select id="service-type" name="service-type">
                            <option value="kotisiivous">Kotisiivous</option>
                            <option value="mokkihuolto">Mökkihuolto</option>
                            <option value="yrityssiivous">Yrityssiivous</option>
                            <option value="muu">Muu (tarkenna viestissä)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="sqm">Kohteen koko (m²)</label>
                        <input type="number" id="sqm" name="sqm" min="1" placeholder="esim. 60">
                    </div>
                </div>
            </fieldset>

            <div class="form-group">
                <label for="message">Lisätiedot ja toiveet</label>
                <textarea id="message" name="message" rows="5" placeholder="Kerro tässä mahdolliset erityistoiveet tai jos kotona on lemmikkejä..."></textarea>
            </div>

            <button type="submit" class="button btn-submit">Lähetä tarjouspyyntö</button>
        </form>
    </section>
</main>
